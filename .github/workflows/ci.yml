name: Repo Guardrails

on:
  pull_request:
    branches:
      - master
      - main
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify guard scripts are valid shell
        run: bash -n .githooks/pre-commit .githooks/prepare-commit-msg scripts/protected-branch-commit-guard.sh scripts/test-protected-branch-commit-guard.sh

      - name: Verify protected-branch guard
        run: bash scripts/test-protected-branch-commit-guard.sh
